# Корневой файл конфигурации Netlify
# Указываем базовую директорию для проекта
[build]
  base = "react-frontend"
  command = "npm install && npm run build"
  publish = "dist"

# Редирект для API запросов на бэкенд-сервер
[[redirects]]
  from = "/api/*"
  to = "https://217.198.6.238:443/api/:splat"
  status = 200
  force = true

# Настройка для SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Переменные окружения для сборки
[build.environment]
  VITE_BACKEND_URL = "https://217.198.6.238:443"
  VITE_API_URL = "https://217.198.6.238:443/api"
  VITE_WS_URL = "https://217.198.6.238:443"
  # Добавляем переменные для Google OAuth
  GOOGLE_CALLBACK_URL = "https://supermock.netlify.app/api/google/callback"
  FRONTEND_URL = "https://supermock.netlify.app"