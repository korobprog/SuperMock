# Конфигурация для деплоя на Netlify
[build]
  command = "npm install && npm run build" # Команда для сборки проекта с установкой зависимостей
  publish = "dist" # Папка, которая будет опубликована

# Редирект для API запросов на бэкенд-сервер
[[redirects]]
  from = "/api/*"
  to = "http://217.198.6.238:80/api/:splat"
  status = 200
  force = true

# Настройка для SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Переменные окружения для сборки
[build.environment]
  VITE_BACKEND_URL = "http://217.198.6.238:80" # Обновлено для соответствия .env.production
  VITE_API_URL = "http://217.198.6.238:80/api"
  VITE_WS_URL = "http://217.198.6.238:80"