server {
    listen 80;
    server_name localhost;
    
    # Логирование для отладки
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;

    # Корневая директория с собранными файлами
    root /usr/share/nginx/html;
    index index.html;

    # Настройка кэширования статических файлов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Обработка запросов к React-приложению
    location / {
        try_files $uri $uri/ /index.html;
        
        # Добавляем заголовки для отладки
        add_header X-Debug-Frontend "nginx-frontend-container";
    }

    # Обработка ошибок
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}